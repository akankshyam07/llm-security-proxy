version: "3.9"
services:
  proxy:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - ollama
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
volumes:
  ollama-data:
